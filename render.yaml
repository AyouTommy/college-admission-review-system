services:
  - type: web
    name: college-admission-backend
    runtime: docker
    dockerfilePath: ./springboot1hme0/Dockerfile
    dockerContext: ./springboot1hme0
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: PORT
        value: 8080
